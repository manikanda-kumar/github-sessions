name: GitHubSessions
options:
  deploymentTarget:
    macOS: 14.0
settings:
  base:
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

schemes:
  GitHubSessions:
    shared: true
    build:
      targets:
        GitHubSessions: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GitHubSessionsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  GitHubSessions:
    type: application
    platform: macOS
    bundleId: com.manik.GitHubSessions
    sources:
      - path: Sources
        type: syncedFolder
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.manik.GitHubSessions
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0

  GitHubSessionsTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.manik.GitHubSessions.Tests
    sources:
      - path: Tests
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Tests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.manik.GitHubSessions.Tests
    dependencies:
      - target: GitHubSessions
